name: Bug report
description: Report a bug in CleanerQt
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.

  - type: input
    id: version
    attributes:
      label: CleanerQt version
      placeholder: "2.0.0"
    validations:
      required: true

  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other
    validations:
      required: true

  - type: dropdown
    id: admin
    attributes:
      label: Ran as Administrator?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open CleanerQt
        2. Scan C:\
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Attach relevant lines from logs/CleanerQt.log if available
      render: text
